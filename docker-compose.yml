services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medextract}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medextract}
      POSTGRES_DB: ${POSTGRES_DB:-medextract}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medextract:medextract@db:5432/medextract}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100,http://localhost:3101,http://127.0.0.1:3100,http://127.0.0.1:3101}
      ML_DIR: ${ML_DIR:-/code/ml}
      DATA_DIR: ${DATA_DIR:-/code/data}
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./backend/app:/code/app
      - ./ml:/code/ml:ro
      - ./data:/code/data:ro

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
